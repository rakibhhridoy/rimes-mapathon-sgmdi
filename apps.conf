upstream hazmapper {
    server 127.0.0.1:2020;
}

server {
    listen 80;
    server_name fermium.systems;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name fermium.systems;

    ssl_certificate /etc/letsencrypt/live/fermium.systems/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/fermium.systems/privkey.pem;

    client_max_body_size 50M;

    location /hazmapper {
        proxy_pass http://hazmapper/hazmapper;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 86400;
    }

    location /hazmapper/_stcore/stream {
        proxy_pass http://hazmapper/hazmapper/_stcore/stream;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_read_timeout 86400;
    }
}
